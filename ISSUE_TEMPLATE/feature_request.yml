name: 💡 Feature Request
description: Suggest an idea or improvement
title: "Feature: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Got an idea to improve AlgoCommit? We’d love to hear it 🚀

  - type: textarea
    id: problem
    attributes:
      label: 🧩 What problem are you facing?
      placeholder: Describe the pain point...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed solution
      placeholder: What would you like to see?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: ⚡ Priority
      options:
        - 🔴 High (important)
        - 🟠 Medium (useful)
        - 🟢 Low (nice to have)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives considered
      placeholder: Any workarounds or other ideas?

  - type: textarea
    id: context
    attributes:
      label: 📝 Additional context
      placeholder: Links, screenshots, references